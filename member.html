<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#247d73">
  <title>予約・作業状況 | DPRO ハウスクリーニング・家事代行</title>
  <script src="config.js"></script>
  <style>
    :root{--main:#247d73;--dark:#17635c;--mint:#e8f6f2;--pale:#f5fbf9;--navy:#173b3a;--text:#29413f;--muted:#647977;--line:#d2e4e0;--orange:#b66316;--red:#b33a3a;--blue:#397aa8;--shadow:0 10px 28px rgba(24,83,77,.1)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#f2f7f5;color:var(--text);font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif;font-size:17px;line-height:1.7}button,input,select,textarea{font:inherit}.wrap{width:min(820px,100%);margin:auto;padding:0 15px 70px}
    header{margin:0 -15px 19px;padding:24px 19px 22px;background:linear-gradient(135deg,#17675f,#2c9084);color:#fff;border-radius:0 0 26px 26px;box-shadow:var(--shadow)}.brand{display:flex;align-items:center;gap:12px}.logo{display:grid;place-items:center;width:48px;height:48px;border-radius:15px;background:rgba(255,255,255,.18);font-size:25px}header small{display:block;font-size:13px;font-weight:800;letter-spacing:.07em;opacity:.92}header h1{margin:1px 0;font-size:clamp(22px,5.8vw,29px);line-height:1.4}header p{margin:11px 0 0;font-size:15px;font-weight:650}.head-actions{display:flex;gap:9px;margin-top:15px}.head-actions a{flex:1;text-align:center;padding:9px 10px;border-radius:11px;background:rgba(255,255,255,.16);color:#fff;text-decoration:none;font-weight:800;font-size:14px}
    .card{margin:15px 0;padding:20px 17px;border:1px solid #dce9e6;border-radius:21px;background:#fff;box-shadow:0 5px 18px rgba(26,76,71,.055)}.card h2{margin:0 0 5px;color:var(--navy);font-size:21px}.sub{margin:0 0 16px;color:var(--muted);font-size:14px}.lookup{max-width:560px;margin:22px auto;padding:24px 19px}.field{margin:14px 0}.field label{display:block;margin-bottom:6px;color:var(--navy);font-weight:800;font-size:16px}input,select,textarea{width:100%;min-height:52px;padding:11px 13px;border:1.5px solid #bdcfcb;border-radius:12px;background:#fff;color:var(--text);font-size:17px}textarea{min-height:110px;resize:vertical}input:focus,select:focus,textarea:focus{outline:3px solid rgba(36,125,115,.16);border-color:var(--main)}
    .primary,.secondary,.danger{min-height:52px;border-radius:13px;font-weight:900;cursor:pointer}.primary{width:100%;border:0;background:linear-gradient(135deg,var(--main),var(--dark));color:#fff;box-shadow:0 7px 18px rgba(36,125,115,.22)}.secondary{border:1.5px solid var(--main);background:#fff;color:var(--dark)}.danger{border:1.5px solid #d79696;background:#fffafa;color:var(--red)}button:disabled{opacity:.55;cursor:not-allowed}.error{display:none;margin:12px 0;padding:12px;border:1px solid #e5b5b5;border-radius:11px;background:#fff1f1;color:#982f2f;font-weight:750}.error.show{display:block}.empty{text-align:center;padding:28px 12px;color:var(--muted)}
    .member-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.member-name{font-size:22px;color:var(--navy);font-weight:900}.member-code{color:var(--muted);font-size:14px}.mini-btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:7px 10px;color:var(--dark);font-weight:800;cursor:pointer}
    .tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:14px 0}.tab{min-height:46px;border:1.5px solid var(--line);border-radius:12px;background:#fff;color:var(--muted);font-weight:850;cursor:pointer}.tab.on{background:var(--main);border-color:var(--main);color:#fff}.booking{overflow:hidden;padding:0}.book-head{padding:18px 17px;background:linear-gradient(135deg,#f1faf7,#fff);border-bottom:1px solid var(--line)}.book-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.booking-code{color:var(--muted);font-size:13px;font-weight:750}.book-date{margin-top:2px;font-size:21px;color:var(--navy);font-weight:900}.badge{display:inline-flex;align-items:center;justify-content:center;min-height:31px;padding:4px 10px;border-radius:99px;background:#e8f3f0;color:var(--dark);font-size:13px;font-weight:900;white-space:nowrap}.badge.orange{background:#fff1df;color:#99540f}.badge.blue{background:#eaf2f9;color:#2f6890}.badge.green{background:#e6f6ec;color:#27754c}.badge.gray{background:#edf1f0;color:#5f6e6c}.book-body{padding:17px}.service-list{margin:0 0 12px;padding:0;list-style:none}.service-list li{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px dashed #d5e1df}.service-list li:last-child{border:0}.info-grid{display:grid;grid-template-columns:1fr;gap:8px;padding:13px;border-radius:14px;background:var(--pale)}.info{display:flex;justify-content:space-between;gap:15px}.info span:first-child{color:var(--muted);font-size:14px}.info strong{text-align:right;color:var(--navy)}
    .progress{margin:18px 0 8px}.progress-track{height:8px;border-radius:99px;background:#dce8e5;overflow:hidden}.progress-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--main),#54a99f)}.steps{display:flex;justify-content:space-between;margin-top:7px;color:var(--muted);font-size:11px}.status-message{margin:12px 0;padding:12px;border-radius:12px;background:var(--mint);color:#285e58;font-weight:700;font-size:14px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:15px}.actions button{width:100%}
    details{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}summary{cursor:pointer;color:var(--dark);font-weight:850}.photos{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.photo{overflow:hidden;border:1px solid var(--line);border-radius:13px;background:#f5f8f7}.photo img{display:block;width:100%;aspect-ratio:4/3;object-fit:cover}.photo div{padding:8px 9px;font-size:13px}.photo-empty{padding:16px;border-radius:12px;background:#f4f8f7;color:var(--muted);font-size:14px;text-align:center}
    .modal{display:none;position:fixed;inset:0;z-index:30;background:rgba(12,42,39,.58);padding:18px;overflow:auto}.modal.show{display:grid;place-items:center}.modal-box{width:min(560px,100%);padding:22px 18px;border-radius:20px;background:#fff;box-shadow:var(--shadow)}.modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.modal-head h2{margin:0;color:var(--navy);font-size:21px}.close{display:grid;place-items:center;width:38px;height:38px;border:0;border-radius:50%;background:#eef4f2;color:var(--dark);font-size:22px;cursor:pointer}.modal-actions{display:grid;grid-template-columns:1fr 1.4fr;gap:9px;margin-top:16px}.success-box{display:none;text-align:center;padding:25px 10px}.success-box.show{display:block}.success-icon{display:grid;place-items:center;width:66px;height:66px;margin:auto;border-radius:50%;background:var(--mint);color:var(--main);font-size:35px;font-weight:900}
    .loading{display:none;position:fixed;inset:0;z-index:50;background:rgba(12,42,39,.55);place-items:center;color:#fff;text-align:center;font-weight:850}.loading.show{display:grid}.spinner{width:46px;height:46px;margin:0 auto 11px;border:5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.hidden{display:none!important}footer{text-align:center;margin-top:27px;color:var(--muted);font-size:13px}
    @media(min-width:650px){.wrap{padding-left:22px;padding-right:22px}header{margin-left:-22px;margin-right:-22px;padding-left:29px;padding-right:29px}.card{padding:23px}.booking{padding:0}.book-head{padding:20px 22px}.book-body{padding:20px 22px}.tabs{grid-template-columns:repeat(3,1fr)}.info-grid{grid-template-columns:1fr 1fr}.photos{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
<div class="wrap">
  <header><div class="brand"><div class="logo">🫧</div><div><small>DPRO CLEAN LIFE SUPPORT</small><h1>予約・作業状況</h1></div></div><p>予約確認から作業完了報告まで、いつでも確認できます。</p><div class="head-actions"><a href="index.html">＋ 新しく予約</a><a href="#support" id="supportLink">お問い合わせ</a></div></header>

  <section id="lookup" class="card lookup">
    <h2>マイページを開く</h2><p class="sub">LINEから開いた場合は自動で表示されます。表示されない場合は、予約時の電話番号を入力してください。</p>
    <div class="field"><label for="phone">電話番号</label><input id="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="例：090-1234-5678"></div>
    <div id="lookupError" class="error"></div><button id="lookupBtn" class="primary" type="button">予約・作業状況を確認</button>
  </section>

  <main id="member" class="hidden">
    <section class="card"><div class="member-head"><div><div id="memberName" class="member-name">ご利用状況</div><div id="memberCode" class="member-code"></div></div><button id="switchBtn" class="mini-btn" type="button">電話番号を変更</button></div></section>
    <div class="tabs"><button class="tab on" data-filter="active">進行中</button><button class="tab" data-filter="history">完了・過去</button><button class="tab" data-filter="all">すべて</button></div>
    <div id="bookings"></div>
  </main>
  <footer><div id="version">HOUSEKEEP-4 MEMBER</div><div>お客様に公開された情報のみを表示しています。</div></footer>
</div>

<div id="modal" class="modal" role="dialog" aria-modal="true"><div class="modal-box"><div id="modalForm"><div class="modal-head"><h2 id="modalTitle">お問い合わせ</h2><button class="close" type="button" aria-label="閉じる">×</button></div><p class="sub" id="modalSub"></p><div class="field"><label for="requestType">ご用件</label><select id="requestType"><option value="change">日時・内容を変更したい</option><option value="cancel">キャンセルを相談したい</option><option value="question">予約について質問したい</option><option value="other">その他</option></select></div><div class="field"><label for="message">内容</label><textarea id="message" placeholder="変更希望日時やご相談内容を入力してください。"></textarea></div><div id="modalError" class="error"></div><div class="modal-actions"><button class="secondary close2" type="button">戻る</button><button id="sendBtn" class="primary" type="button">送信する</button></div></div><div id="modalSuccess" class="success-box"><div class="success-icon">✓</div><h2>送信しました</h2><p>担当者が確認後、ご連絡します。</p><button class="primary close3" type="button">マイページへ戻る</button></div></div></div>
<div id="loading" class="loading"><div><div class="spinner"></div><div>読み込み中です…</div></div></div>

<script>
const C=window.DPRO_HOUSEKEEP_CONFIG||{},API=C.API_BASE,COMPANY=C.COMPANY_CODE||'dpro_housekeep_demo';const $=id=>document.getElementById(id);let all=[],currentFilter='active',currentBooking=null,currentIdentity={};
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const yen=n=>n==null?'確認中':new Intl.NumberFormat('ja-JP',{style:'currency',currency:'JPY',maximumFractionDigits:0}).format(n);const fmtDate=d=>{if(!d)return'未定';const x=new Date(d+'T12:00:00+09:00');return new Intl.DateTimeFormat('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'}).format(x)};
const statusMap={requested:['受付済み','orange',18,'内容を確認しています。確定連絡をお待ちください。'],estimate_review:['見積り確認中','orange',22,'写真または訪問内容を確認しています。'],quoted:['見積りご案内','blue',30,'見積り内容をご確認ください。'],confirmed:['予約確定','blue',40,'予約日時が確定しました。'],staff_assigned:['担当者決定','blue',52,'担当スタッフが決まりました。'],traveling:['訪問中','blue',63,'担当スタッフが訪問先へ向かっています。'],arrived:['到着','blue',70,'担当スタッフが到着しました。'],in_progress:['作業中','blue',78,'ただいま作業中です。'],customer_check:['最終確認','orange',90,'作業内容の最終確認を行っています。'],completed:['完了','green',100,'作業が完了しました。ご利用ありがとうございました。'],change_requested:['変更受付中','orange',35,'変更希望を確認しています。'],cancel_requested:['キャンセル確認中','orange',35,'キャンセル希望を確認しています。'],cancelled:['キャンセル','gray',100,'キャンセル済みの予約です。'],no_show:['未実施','gray',100,'作業は実施されませんでした。']};
function loading(v){$('loading').classList.toggle('show',v)}function showErr(id,m){$(id).textContent=m;$(id).classList.add('show')}async function api(path,opt={}){const u=new URL(API+path);u.searchParams.set('company_code',COMPANY);const r=await fetch(u,{...opt,headers:{'Content-Type':'application/json',...(opt.headers||{})}});const d=await r.json().catch(()=>({}));if(!r.ok||d.ok===false)throw new Error(d.error||'通信に失敗しました');return d}
function params(){const p=new URLSearchParams(location.search);return{line_user_id:p.get('line_user_id')||p.get('uid'),token:p.get('token'),phone:p.get('phone')}}
async function lookup(identity){$('lookupError').classList.remove('show');loading(true);try{let query='';if(identity.token)query='token='+encodeURIComponent(identity.token);else if(identity.line_user_id)query='line_user_id='+encodeURIComponent(identity.line_user_id);else{const phone=(identity.phone||$('phone').value).trim();if(!phone)throw new Error('予約時の電話番号を入力してください。');query='phone='+encodeURIComponent(phone);identity.phone=phone}const d=await api('/api/booking/lookup?'+query);all=d.bookings||[];currentIdentity=identity;$('lookup').classList.add('hidden');$('member').classList.remove('hidden');$('memberName').textContent=all.length?'ご予約・ご利用状況':'予約はまだありません';$('memberCode').textContent=all.length?`最新の受付番号：${all[0].booking_code}`:'';render()}catch(e){showErr('lookupError',e.message)}finally{loading(false)}}
function render(){const done=['completed','cancelled','no_show'];let rows=all;if(currentFilter==='active')rows=all.filter(x=>!done.includes(x.status));if(currentFilter==='history')rows=all.filter(x=>done.includes(x.status));$('bookings').innerHTML=rows.length?rows.map(card).join(''):`<section class="card empty"><div style="font-size:36px">🧹</div><strong>${currentFilter==='active'?'現在進行中の予約はありません':'該当する予約はありません'}</strong><p><a href="index.html" style="color:var(--main);font-weight:850">新しく予約する</a></p></section>`;document.querySelectorAll('[data-action]').forEach(b=>b.addEventListener('click',()=>openModal(b.dataset.id,b.dataset.action)))}
function card(b){const s=statusMap[b.status]||[b.status,'gray',10,'状況を確認しています。'],items=b.housekeep_booking_items||[],staff=b.housekeep_staff?.name||'調整中',addr=b.housekeep_addresses?`${b.housekeep_addresses.city||''}${b.housekeep_addresses.address1||''}${b.housekeep_addresses.address2||''}`:'登録済み訪問先',amount=b.final_amount??b.estimated_amount;return `<section class="card booking"><div class="book-head"><div class="book-top"><div><div class="booking-code">受付番号 ${esc(b.booking_code)}</div><div class="book-date">${esc(fmtDate(b.requested_date))} ${esc(String(b.requested_start_time||'').slice(0,5))}</div></div><span class="badge ${s[1]}">${esc(s[0])}</span></div></div><div class="book-body"><ul class="service-list">${items.map(i=>`<li><strong>${esc(i.service_name)}</strong><span>${i.amount==null?'要見積り':yen(i.amount)}</span></li>`).join('')}</ul><div class="info-grid"><div class="info"><span>担当者</span><strong>${esc(staff)}</strong></div><div class="info"><span>料金</span><strong>${yen(amount)}</strong></div><div class="info"><span>支払状況</span><strong>${esc({unpaid:'未払い',pending:'確認中',paid:'支払済み',refunded:'返金済み',not_required:'支払いなし'}[b.payment_status]||'確認中')}</strong></div><div class="info"><span>訪問先</span><strong>${esc(addr)}</strong></div></div><div class="progress"><div class="progress-track"><div class="progress-bar" style="width:${s[2]}%"></div></div><div class="steps"><span>受付</span><span>確定</span><span>作業</span><span>完了</span></div></div><div class="status-message">${esc(s[3])}</div>${b.customer_request?`<details><summary>予約時のご要望</summary><p>${esc(b.customer_request)}</p></details>`:''}<details><summary>作業前・作業後の写真</summary>${photos(b.photos||[])}</details><div class="actions"><button class="secondary" data-action="change" data-id="${b.id}" type="button">変更・質問</button><button class="danger" data-action="cancel" data-id="${b.id}" type="button">キャンセル相談</button></div></div></section>`}
function photos(list){return list.length?`<div class="photos">${list.map(p=>`<div class="photo"><img src="${esc(p.url)}" alt="${p.photo_type==='before'?'作業前':'作業後'}"><div><strong>${p.photo_type==='before'?'作業前':'作業後'}</strong><br>${esc(p.caption||'')}</div></div>`).join('')}</div>`:'<div class="photo-empty">お客様に公開された写真はまだありません。<br>作業報告後にこちらへ表示されます。</div>'}
function openModal(id,type){currentBooking=all.find(x=>x.id===id)||null;$('modalForm').classList.remove('hidden');$('modalSuccess').classList.remove('show');$('modalTitle').textContent=type==='cancel'?'キャンセルのご相談':'予約変更・お問い合わせ';$('requestType').value=type;$('message').value='';$('modalSub').textContent=currentBooking?`受付番号：${currentBooking.booking_code}`:'';$('modalError').classList.remove('show');$('modal').classList.add('show')}
function closeModal(){$('modal').classList.remove('show')}async function send(){const message=$('message').value.trim();if(!message)return showErr('modalError','ご相談内容を入力してください。');$('sendBtn').disabled=true;loading(true);try{const type=$('requestType').value;const d=await api('/api/inquiry/create',{method:'POST',body:JSON.stringify({booking_id:currentBooking?.id||null,inquiry_type:type,subject:type==='cancel'?'キャンセル相談':type==='change'?'予約変更希望':'マイページからのお問い合わせ',message})});$('modalForm').classList.add('hidden');$('modalSuccess').classList.add('show')}catch(e){showErr('modalError',e.message)}finally{loading(false);$('sendBtn').disabled=false}}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');currentFilter=t.dataset.filter;render()}));$('lookupBtn').addEventListener('click',()=>lookup({phone:$('phone').value}));$('phone').addEventListener('keydown',e=>{if(e.key==='Enter')$('lookupBtn').click()});$('switchBtn').addEventListener('click',()=>{$('member').classList.add('hidden');$('lookup').classList.remove('hidden');$('phone').focus()});$('supportLink').addEventListener('click',e=>{e.preventDefault();openModal(all[0]?.id,'question')});document.querySelector('.close').addEventListener('click',closeModal);document.querySelector('.close2').addEventListener('click',closeModal);document.querySelector('.close3').addEventListener('click',closeModal);$('sendBtn').addEventListener('click',send);$('modal').addEventListener('click',e=>{if(e.target===$('modal'))closeModal()});
const initial=params();$('version').textContent=`${C.VERSION||'HOUSEKEEP'} / HOUSEKEEP-4-MEMBER-20260716`;if(initial.line_user_id||initial.token||initial.phone)lookup(initial);
</script>
</body>
</html>
